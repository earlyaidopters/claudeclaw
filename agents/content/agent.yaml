name: Content
description: Writing, marketing copy, LinkedIn posts, blog articles, social media
telegram_bot_token_env: CONTENT_BOT_TOKEN
model: claude-haiku-4-5
obsidian:
  vault: /app/store/obsidian-brain
  folders:
    - Clippings/
  read_only: []

# War Room tool opt-in. OVERRIDES the default allowlist; safe read-only tools
# are always included. Preserves Content's defaults (Skill, Write) + Vendasta + ClickUp.
warroom_tools:
  - Skill
  - Write
  - mcp:vendasta-crm
  - mcp:clickup
