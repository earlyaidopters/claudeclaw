name: Deploy to Fly.io

on:
  push:
    branches: [main]
    # NOTE: CLAUDE.md is intentionally NOT in this ignore list — it ships
    # into the container (per Dockerfile) as Nikki's system prompt, so
    # edits to it must trigger a redeploy. Other top-level markdown is
    # documentation only and can be skipped.
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "FLY-MIGRATION.md"
      - "AGENTS.md"
      - "docs/**"
      - ".github/**"
      - "scripts/**"
      - "memory/**"
      - "store/**"
      - "logs/**"
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  deploy:
    name: Build + Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --strategy immediate --app claudeclaw-impactworks
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
